name: tiny-cifar
project_id: ${PROJECT_ID}
region: ${REGION}
bucket: ${BUCKET_NAME}
artifact_repo: ${AR_REPO}
service_account: ${SA_EMAIL}
image:
  name: acr-minimal-runner
  tag: latest
build:
  base_image: pytorch/pytorch:2.11.0-cuda13.0-cudnn9-runtime
  requirements: requirements.txt
files:
  include: ["train_eval.py", "requirements.txt", "src/**"]
  required: ["train_eval.py", "requirements.txt"]
source:
  gcs_prefix: gs://${BUCKET_NAME}/acr-sources/tiny-cifar
runtime:
  command: ["python", "train_eval.py"]
  workdir: /workspace/app
# Optional; override with --dataset gs://bucket/path when needed.
dataset:
  uri: gs://${BUCKET_NAME}/datasets/tiny-cifar10
  container_dir: /workspace/app/data
  unpack: auto
cloud_run:
  gpu: 1
  gpu_type: nvidia-l4
  cpu: 4
  memory: 16Gi
  tasks: 1
  parallelism: 1
  max_retries: 0
  task_timeout: 3600s
artifacts:
  container_dir: /workspace/artifacts
  gcs_prefix: gs://${BUCKET_NAME}/acr-runs/minimal-train
  local_dir: ./artifacts/minimal-train-latest
env:
  PYTHONUNBUFFERED: "1"
